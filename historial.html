<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
</head>
<link rel="stylesheet" href="estilos.css">
<body>

<div class="dashboard-container">

<h1>Dashboard</h1>

<div class="stats">

<div class="card">
<h3>Total Pacientes</h3>
<span id="totalPacientes">0</span>
</div>

<div class="card">
<h3>Total Historiales</h3>
<span id="totalHistoriales">0</span>
</div>

</div>

<div class="ultimos">
<h3>Últimos pacientes registrados</h3>
<ul id="listaPacientes"></ul>
</div>

</div>

<script>

let pacientes = JSON.parse(localStorage.getItem("pacientes")) || [];

document.getElementById("totalPacientes").textContent = pacientes.length;
document.getElementById("totalHistoriales").textContent = pacientes.length;

let lista = document.getElementById("listaPacientes");

pacientes.slice(-5).reverse().forEach(p => {
    let li = document.createElement("li");
    li.textContent = p.Nombre + " " + p.Apellido;
    lista.appendChild(li);
});

</script>

</body>
</html>
