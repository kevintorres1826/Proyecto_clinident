<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Historial</title>
<link rel="stylesheet" href="estilos.css">
</head>

<body>

<h1>Historial de Pacientes</h1>

<table>

<thead>
<tr>
<th>Nombre</th>
<th>Apellido</th>
<th>Teléfono</th>
<th>Dirección</th>
<th>Edad</th>
<th>Diagnóstico</th>
<th>Tratamiento</th>
</tr>
</thead>

<tbody id="tablaPacientes">

</tbody>

</table>

<script>

let pacientes = JSON.parse(localStorage.getItem("pacientes")) || [];

let tabla = document.getElementById("tablaPacientes");

pacientes.forEach((p, index) => {

let pacienteHTML = `
<div class="paciente">

<p><b>Nombre:</b> ${p.Nombre} ${p.Apellido}</p>
<p><b>Teléfono:</b> ${p.Telefono}</p>
<p><b>Dirección:</b> ${p.Direccion}</p>
<p><b>Edad:</b> ${p.Edad}</p>
<p><b>Diagnóstico:</b> ${p.Diagnostico}</p>
<p><b>Tratamiento:</b> ${p.Tratamiento}</p>

<button class="btn-eliminar" onclick="eliminarPaciente(${index})">
🗑
</button>

</div>
`;

contenedor.innerHTML += pacienteHTML;

});


function eliminarPaciente(index){

if(confirm("¿Eliminar este paciente?")){

pacientes.splice(index,1);

localStorage.setItem("pacientes", JSON.stringify(pacientes));

mostrarPacientes();

}

}

mostrarPacientes();

</script>

</body>
</html>
