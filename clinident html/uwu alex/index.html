<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Primera web</title>
<link rel="stylesheet" href="estilos.css">
</head>

<body>

<div class="sidebar">   
    <nav>
        <ul>
            <li><img src="img/logo.jpg" alt="Logo" style="width:150px;"></li>

            <li>
                <a href="dashboard.html">
                    <button type="button" class="btn-sidebar">Dashboard</button>
                </a>
            </li>

            <li>
                <a href="historial.html">
                    <button type="button" class="btn-sidebar">Historial</button>
                </a>
            </li>

            <li>
                <a href="estadisticas.html">
                    <button type="button" class="btn-sidebar">Estadísticas</button>
                </a>
            </li>

        </ul>
    </nav>
</div>

<form id="formPaciente">
<input type="text" id="Nombre" name="Nombre" placeholder="Nombre del paciente">
<input type="text" id="Apellido" name="Apellido" placeholder="Apellido">
<input type="text" id="Telefono" name="Telefono" placeholder="Teléfono">
<input type="text" id="Direccion" name="Direccion" placeholder="Dirección">
<input type="text" id="Edad" name="Edad" placeholder="Edad">
<textarea rows="10" id="Diagnostico" name="Diagnostico" placeholder="Diagnostico del paciente"></textarea>
<textarea rows="10" id="Tratamiento" name="Tratamiento" placeholder="Tratamiento"></textarea>
<input type="submit" value="Registrar">
</form>
<script>

let form = document.querySelector("form");

form.addEventListener("submit", function(e){

e.preventDefault();

let pacientes = JSON.parse(localStorage.getItem("pacientes")) || [];

let nuevoPaciente = {

Nombre: form.Nombre.value,
Apellido: form.Apellido.value,
Telefono: form.Telefono.value,
Direccion: form.Direccion.value,
Edad: form.Edad.value,
Diagnostico: form.Diagnostico.value,
Tratamiento: form.Tratamiento.value

};

pacientes.push(nuevoPaciente);

localStorage.setItem("pacientes", JSON.stringify(pacientes));

form.reset();

alert("Paciente registrado correctamente");

});

</script>
</body>
</html>
