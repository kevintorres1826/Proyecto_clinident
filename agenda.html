
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLINIDENT | Elite Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
    --primary: #0f172a;
    --accent: #2563eb;
    --accent-soft: #dbeafe;
    --bg-main: linear-gradient(135deg, #4db6ac, #2563eb);
    --white: #ffffff;
}

body {
    margin: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: var(--primary);
    background: var(--bg-main);
    min-height: 100vh;
}

/* NAVBAR */
.navbar {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    padding: 15px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
}

.logo {
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -1px;
    cursor: pointer;
}

.logo span { color: #93c5fd; }

/* CONTENEDOR */
.container {
    max-width: 1000px;
    margin: 40px auto;
    padding: 20px;
}

/* CARD */
.glass-card {
    background: rgba(255,255,255,0.9);
    border-radius: 22px;
    padding: 40px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
}

/* MENU */
.menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
}

.menu-item {
    background: rgba(255,255,255,0.95);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
    position: relative;
    overflow: hidden;
}

.menu-item::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent, rgba(37,99,235,0.2), transparent);
    opacity: 0;
    transition: 0.3s;
}

.menu-item:hover::after {
    opacity: 1;
}

.menu-item:hover {
    transform: translateY(-6px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

.menu-item i {
    font-size: 50px;
    margin-bottom: 15px;
}

/* INPUTS */
select, input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
    background: #f8fafc;
    transition: 0.2s;
}

select:focus, input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft);
}

/* ARREGLO SELECT */
select option {
    color: #0f172a;
    background: #ffffff;
}

/* HORAS */
.hora-slot {
    padding: 16px;
    border-radius: 12px;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    text-align: center;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

.hora-slot:hover:not(.occupied) {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
}

.selected {
    background: var(--accent) !important;
    color: white !important;
    border-color: var(--accent) !important;
}

.occupied {
    background: #e2e8f0;
    color: #94a3b8;
    cursor: not-allowed;
    border: 1px dashed #cbd5e1;
}

.hora-slot:hover {
    background: var(--accent-soft);
    color: var(--accent);
}

.selected {
    background: var(--accent) !important;
    color: white !important;
}

.occupied {
    background: #e2e8f0;
    color: #94a3b8;
    cursor: not-allowed;
}

/* BOTONES */
.btn-confirm {
    width: 100%;
    padding: 16px;
    margin-top: 25px;
    background: linear-gradient(135deg, #2563eb, #60a5fa);
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
}

.btn-confirm:hover {
    transform: scale(1.03);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.btn-back {
    background: rgba(255,255,255,0.7);
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 20px;
}

/* LISTA */
.report-item {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    background: #f8fafc;
    border-radius: 15px;
    margin-bottom: 12px;
    transition: 0.2s;
}

.report-item:hover {
    transform: scale(1.02);
}

/* ANIMACIÓN */
.view { display: none; }
.active { display: block; animation: fadeIn 0.4s ease; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px);}
    to { opacity: 1; transform: translateY(0);}
}
/* 🔲 GRID DE HORAS (como el original) */
.grid-horas {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px;
    margin-top: 30px;
}

/* 🟦 BOTONES DE HORA */
.hora-slot {
    padding: 16px;
    border-radius: 12px;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    text-align: center;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

/* HOVER */
.hora-slot:hover:not(.occupied) {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
}

/* SELECCIONADO */
.selected {
    background: var(--accent) !important;
    color: white !important;
    border-color: var(--accent) !important;
}

/* OCUPADO */
.occupied {
    background: #e2e8f0;
    color: #94a3b8;
    cursor: not-allowed;
    border: 1px dashed #cbd5e1;
}
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="location.reload()">CLINI<span>DENT</span></div>
        <div style="font-weight: 800; color: var(--accent);">2026</div>
    </nav>

    <div class="container">
        
        <div id="view-menu" class="view active">
            <h1 style="color: white; font-size: 2.8rem; margin: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.2);">Bienvenido, <span style="color:var(--primary)">Nico</span></h1>
            <p style="color: white; margin-bottom: 40px; font-weight: 600;">Gestión de citas médicas de alta precisión.</p>
            
            <div class="menu-grid">
                <div class="menu-item" onclick="prepararAgendado()">
                    <i style="color: var(--accent);">📅</i>
                    <h3>Asignar Cita</h3>
                    <p style="color: #64748b;">Nuevos pacientes.</p>
                </div>
                <div class="menu-item" onclick="renderLista(); cambiarVista('lista')">
                    <i style="color: var(--accent);">📋</i>
                    <h3>Ver Citas</h3>
                    <p style="color: #64748b;">Consultar registros.</p>
                </div>
            </div>
        </div>

        <div id="view-agendar" class="view glass-card">
            <button class="btn-back" onclick="cancelarEdicion()">← VOLVER</button>
            <h2 id="titulo-agendar" style="margin: 0 0 35px 0; color: var(--accent);">Configurar Agendamiento</h2>
            
            <div class="form-row">
                <div class="input-group">
                    <label style="display:block; font-weight:700; margin-bottom:10px;">ESPECIALISTA</label>
                    <select id="doc" onchange="actualizarAgenda()">
                        <option>Dr. Alberto Casas (General)</option>
                        <option>Dra. Elena Marín (Ortodoncia)</option>
                        <option>Dr. Camilo Ruiz (Cirugía)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label style="display:block; font-weight:700; margin-bottom:10px;">FECHA</label>
                    <input type="date" id="fecha" onchange="actualizarAgenda()">
                </div>
            </div>
            
            <label style="display:block; font-weight:700; margin-bottom:10px;">HORARIOS DISPONIBLES</label>
            <div id="grid-horas" class="grid-horas"></div>

            <input type="hidden" id="edit-id" value="">
            <input type="hidden" id="hora-seleccionada">
            <button class="btn-confirm" id="btn-save" onclick="finalizarAgendado()">Confirmar Espacio Médico</button>
        </div>

        <div id="view-lista" class="view glass-card">
            <button class="btn-back" onclick="cambiarVista('menu')">← VOLVER AL MENÚ</button>
            <h2 style="margin: 0 0 30px 0; color: var(--accent);">Reporte de Citas</h2>
            <div id="lista-citas"></div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('clinident_db_final')) || [];
        const horarios = ["08:00 AM", "08:30 AM", "09:00 AM", "09:30 AM", "10:00 AM", "10:30 AM", "11:00 AM", "11:30 AM", "01:00 PM", "01:30 PM", "02:00 PM", "02:30 PM", "03:00 PM", "03:30 PM", "04:00 PM", "04:30 PM", "05:00 PM"];

        function cambiarVista(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
        }

        function prepararAgendado() {
            document.getElementById('edit-id').value = "";
            document.getElementById('titulo-agendar').innerText = "Configurar Agendamiento";
            document.getElementById('btn-save').innerText = "Confirmar Espacio Médico";
            document.getElementById('fecha').valueAsDate = new Date();
            cambiarVista('agendar');
            actualizarAgenda();
        }

        function actualizarAgenda() {
            const grid = document.getElementById('grid-horas');
            const doc = document.getElementById('doc').value;
            const fecha = document.getElementById('fecha').value;
            const editId = document.getElementById('edit-id').value;
            grid.innerHTML = '';
            
            horarios.forEach(h => {
                const ocupado = db.find(c => c.doc === doc && c.fecha === fecha && c.hora === h && c.id.toString() !== editId);
                const div = document.createElement('div');
                div.className = 'hora-slot' + (ocupado ? ' occupied' : '');
                div.innerText = h;
                if(!ocupado) {
                    if(document.getElementById('hora-seleccionada').value === h) div.classList.add('selected');
                    div.onclick = function() {
                        document.querySelectorAll('.hora-slot').forEach(s => s.classList.remove('selected'));
                        this.classList.add('selected');
                        document.getElementById('hora-seleccionada').value = h;
                    };
                }
                grid.appendChild(div);
            });
        }

        function finalizarAgendado() {
            const doc = document.getElementById('doc').value;
            const fecha = document.getElementById('fecha').value;
            const hora = document.getElementById('hora-seleccionada').value;
            const editId = document.getElementById('edit-id').value;

            if(!fecha || !hora) { alert('⚠️ Seleccione fecha y horario.'); return; }

            if(editId) {
                const index = db.findIndex(c => c.id.toString() === editId);
                db[index] = { ...db[index], doc, fecha, hora };
            } else {
                db.push({ id: Date.now(), doc, fecha, hora });
            }

            localStorage.setItem('clinident_db_final', JSON.stringify(db));
            renderLista();
            cambiarVista('lista');
        }

        function renderLista() {
            const res = document.getElementById('lista-citas');
            res.innerHTML = db.length ? '' : '<p style="text-align:center; padding:40px;">No hay citas.</p>';
            db.sort((a,b) => new Date(a.fecha) - new Date(b.fecha)).forEach(c => {
                res.innerHTML += `
                    <div class="report-item">
                        <div>
                            <b style="font-size:1.1rem; color:var(--accent);">${c.doc}</b><br>
                            <span>${c.fecha} • ${c.hora}</span>
                        </div>
                        <div class="actions-btns">
                            <button class="btn-edit" onclick="cargarParaEditar(${c.id})">Editar</button>
                            <button class="btn-cancel" onclick="eliminar(${c.id})">Eliminar</button>
                        </div>
                    </div>`;
            });
        }

        function cargarParaEditar(id) {
            const cita = db.find(c => c.id === id);
            document.getElementById('edit-id').value = cita.id;
            document.getElementById('doc').value = cita.doc;
            document.getElementById('fecha').value = cita.fecha;
            document.getElementById('hora-seleccionada').value = cita.hora;
            cambiarVista('agendar');
            actualizarAgenda();
        }

        function cancelarEdicion() {
            document.getElementById('edit-id').value = "";
            cambiarVista('menu');
        }

        function eliminar(id) {
            if(confirm('¿Eliminar cita?')) {
                db = db.filter(c => c.id !== id);
                localStorage.setItem('clinident_db_final', JSON.stringify(db));
                renderLista();
            }
        }
    </script>
</body>
</html>
"""
