<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLINIDENT - Sistema Dental</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

/* FONDO MÁS PRO */
body{
background: linear-gradient(
    270deg,
    #006eff,
    #1e3a8a,
    #0071db,
    #1e3a8a
);
background-size: 300% 300%;  
animation: fondoAnimado 14s ease-in-out infinite;
padding:30px;
color:#1e293b;
}

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background: radial-gradient(circle at 70% 30%, rgba(255,255,255,0.06), transparent 40%);
pointer-events:none;
}

@keyframes fondoAnimado{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
max-width:1100px;
margin:auto;
}

/* HEADER MÁS LIMPIO */
.header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:25px;
}

.header img{
width:140px;
filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
}

.header h1{
flex:1;
text-align:center;
color:white;
font-weight:800;
letter-spacing:-1px;
}

/* TITULOS */
h2{
margin-bottom:15px;
color:#0f172a;
font-weight:700;
}

/* CARDS PREMIUM */
.section{
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:16px;
margin-bottom:25px;

box-shadow:0 20px 40px rgba(0,0,0,0.25);
backdrop-filter:blur(10px);

transition:all .3s ease;
}

.section:hover{
transform:translateY(-6px) scale(1.01);
box-shadow:0 25px 50px rgba(0,0,0,0.35);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:18px;
}

/* INPUTS PRO */
label{
display:block;
margin-bottom:5px;
font-size:13px;
font-weight:600;
color:#334155;
}

input,select,textarea{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #e2e8f0;
background:#f8fafc;
margin-bottom:8px;

transition:all .25s ease;
}

input:focus,select:focus,textarea:focus{
outline:none;
border-color:#2563eb;
box-shadow:0 0 0 3px rgba(37,99,235,0.2);
transform:scale(1.02);
background:white;
}

/* BOTONES NIVEL PRO */
button{
cursor:pointer;
border:none;
border-radius:12px;
padding:12px 18px;
font-weight:600;
margin-right:10px;
margin-top:10px;
transition:all .25s ease;
position:relative;
overflow:hidden;
}

/* HOVER */
button:hover{
transform:translateY(-3px) scale(1.04);
box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

/* CLICK */
button:active{
transform:scale(0.96);
}

/* BRILLO */
button::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
transition:0.5s;
}

button:hover::before{
left:100%;
}

/* COLORES BOTONES */
.btn-primary{
background:linear-gradient(135deg,#2563eb,#60a5fa);
color:white;
}

.btn-gray{
background:#e2e8f0;
}

.btn-danger{
background:linear-gradient(135deg,#ef4444,#dc2626);
color:white;
}

.btn-success{
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
}

/* TABLA MÁS PRO */
.table{
width:100%;
border-collapse:collapse;
margin-top:15px;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.table th{
background:#2563eb;
color:white;
font-weight:600;
}

.table th,.table td{
padding:12px;
border-bottom:1px solid #e2e8f0;
}

.table tbody tr{
transition:all .2s ease;
}

.table tbody tr:hover{
background:#dbeafe;
transform:scale(1.01);
}

/* TOTAL */
.total-big{
font-size:24px;
font-weight:bold;
color:#16a34a;
}

.total-box{
background:linear-gradient(135deg,#e0f2fe,#dbeafe);
padding:18px;
border-radius:14px;
margin-top:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* ALERT */
.alert{
background:#dcfce7;
color:#166534;
padding:12px;
border-radius:10px;
margin-top:15px;
display:none;
}

/* MODAL MÁS PRO */
.modal-bg{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
backdrop-filter:blur(5px);
}

.modal{
background:white;
width:750px;
padding:30px;
border-radius:16px;
max-height:90vh;
overflow:auto;
box-shadow:0 25px 60px rgba(0,0,0,0.5);
animation:fadeIn .3s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(-20px);}
to{opacity:1; transform:translateY(0);}
}

/* FACTURA HEADER */
.factura-header{
background:linear-gradient(135deg,#2563eb,#60a5fa);
color:white;
padding:20px;
border-radius:12px;
text-align:center;
margin-bottom:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="clinident_logo.png">
<h1>CLINIDENT - Sistema Dental</h1>
<img src="mascota.png">
</div>

<div class="section">

<h2>Datos del Paciente</h2>

<div class="grid">

<div>
<label>Seleccionar Paciente</label>
<select id="selectPaciente" onchange="seleccionarPaciente()">
<option value="">Seleccione</option>
</select>
</div>

<div>
<label>Nombre</label>
<input id="nombre">
</div>

<div>
<label>Documento</label>
<input id="documento">
</div>

<div>
<label>Odontólogo</label>
<select id="doctor" onchange="actualizarTratamientos()">
<option>Dra. Paula Ríos - Ortodoncia</option>
<option>Dr. Carlos Méndez - Endodoncia</option>
<option>Dra. Laura Sánchez - Odontología General</option>
</select>
</div>

</div>

<button class="btn-gray" onclick="crearPaciente()">Nuevo Paciente</button>
<button class="btn-danger" onclick="eliminarPaciente()">Eliminar Paciente</button>
<button class="btn-gray" onclick="historialPaciente()">Historial del Paciente</button>

<button class="btn-primary" onclick="crearConsulta()">Crear Consulta</button>
<button class="btn-danger" onclick="nuevaConsulta()">Nueva Consulta</button>

<div class="alert" id="consultaOK">✔ Consulta Activa</div>

<label style="margin-top:15px;">Diagnóstico</label>
<textarea id="diagnostico" rows="3"></textarea>

</div>

<div class="section">

<h2>Tratamientos</h2>

<select id="listaTratamientos"></select>
<button class="btn-primary" onclick="agregarTratamiento()">Agregar</button>

<table class="table">

<thead>
<tr>
<th>Tratamiento</th>
<th>Precio</th>
<th>Cant</th>
<th>Subtotal</th>
<th></th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

<div class="total-box">

<label>Descuento (%)</label>
<input type="number" id="descuento" value="0" min="0" max="100" oninput="calcularTotal()">

<label>Impuesto (%)</label>
<input type="number" id="impuesto" value="0" min="0" max="100" oninput="calcularTotal()">

<p>Subtotal: <strong id="subtotal">$0.00</strong></p>

<p class="total-big">TOTAL: $<span id="total">0.00</span></p>

</div>

</div>

<div class="section">

<h2>Factura y Pago</h2>

<button class="btn-success" onclick="emitirFactura()">
    Confirmar y registrar pago
</button>

<button class="btn-gray" onclick="verPagos()">Ver Pagos</button>

</div>

<div class="modal-bg" id="modalFactura">
<div class="modal" id="contenidoFactura"></div>
</div>

<div class="modal-bg" id="modalPagos">
<div class="modal" id="contenidoPagos"></div>
</div>

</div>

<script>

let pacientes = JSON.parse(localStorage.getItem("pacientes")) || [
{nombre:"Juan Pérez",documento:"87654321"},
{nombre:"María López",documento:"12345678"},
{nombre:"Carlos Torres",documento:"99887766"}
];

let tratamientos=[];
let consultaActiva=false;
let totalFinal=0;
let facturaGenerada=false;
let pagos = JSON.parse(localStorage.getItem("pagos")) || [];
let facturasEliminadas = JSON.parse(localStorage.getItem("facturasEliminadas")) || [];
let numeroFactura = parseInt(localStorage.getItem("numeroFactura")) || 1;

const tratamientosDB={
"Dra. Paula Ríos - Ortodoncia":[
{nombre:"Consulta Ortodoncia",precio:75},
{nombre:"Brackets Metálicos",precio:300},
{nombre:"Brackets Estéticos",precio:450},
{nombre:"Retenedor",precio:120},
{nombre:"Control Mensual",precio:40}
],
"Dr. Carlos Méndez - Endodoncia":[
{nombre:"Endodoncia Unirradicular",precio:200},
{nombre:"Endodoncia Multirradicular",precio:350},
{nombre:"Retratamiento",precio:280},
{nombre:"Radiografía",precio:30}
],
"Dra. Laura Sánchez - Odontología General":[
{nombre:"Consulta General",precio:50},
{nombre:"Limpieza Dental",precio:60},
{nombre:"Resina Dental",precio:90},
{nombre:"Extracción Simple",precio:110},
{nombre:"Blanqueamiento",precio:250}
]
};

function historialPaciente(){

let doc = documento.value;

if(doc==""){
alert("Seleccione un paciente");
return;
}

let facturasPaciente = pagos.filter(p => p.paciente === nombre.value);

let contenido = `<h2>Historial de ${nombre.value}</h2>
<table class="table">
<tr>
<th>Factura</th>
<th>Total</th>
<th>Acción</th>
</tr>`;

facturasPaciente.forEach((f,i)=>{

contenido+=`
<tr>
<td>${f.factura}</td>
<td>$${f.total.toFixed(2)}</td>
<td>
<button onclick="verDetalleFactura(${pagos.indexOf(f)})"
class="btn-primary">Ver</button>
</td>
</tr>
`;

});

contenido+=`</table>
<br>
<button onclick="cerrarPagos()" class="btn-primary">Cerrar</button>`;

contenidoPagos.innerHTML = contenido;
modalPagos.style.display = "flex";

}

function eliminarPaciente(){

let index = document.getElementById("selectPaciente").value;

if(index === ""){
alert("Seleccione un paciente");
return;
}

if(!confirm("¿Seguro que desea eliminar este paciente?")){
return;
}

// eliminar del array
pacientes.splice(index,1);

// recargar lista
cargarPacientes();

// limpiar campos
nombre.value="";
documento.value="";
document.getElementById("selectPaciente").value="";

alert("Paciente eliminado");

}

function cargarPacientes(){
let select=document.getElementById("selectPaciente");
select.innerHTML='<option value="">Seleccione</option>';
pacientes.forEach((p,i)=>{
select.innerHTML+=`<option value="${i}">${p.nombre}</option>`;
});
}

function seleccionarPaciente(){
let index=document.getElementById("selectPaciente").value;
if(index==="")return;
let p=pacientes[index];
nombre.value=p.nombre;
documento.value=p.documento;
}

function crearPaciente(){
let nom=nombre.value.trim();
let doc=documento.value.trim();

if(nom==""||doc==""){
alert("Ingrese nombre y documento");
return;
}

if(pacientes.some(p=>p.documento==doc)){
alert("Paciente ya registrado");
return;
}

pacientes.push({nombre:nom,documento:doc});

// guardar pacientes
localStorage.setItem("pacientes", JSON.stringify(pacientes));

cargarPacientes();
alert("Paciente agregado");
}

function crearConsulta(){
if(nombre.value==""||documento.value==""){
alert("Seleccione paciente");
return;
}
consultaActiva=true;
document.getElementById("consultaOK").style.display="block";
}

function nuevaConsulta(){
consultaActiva=false;
facturaGenerada=false;
tratamientos=[];
renderTabla();
document.getElementById("consultaOK").style.display="none";
diagnostico.value="";
}

function actualizarTratamientos(){
let doctor=document.getElementById("doctor").value;
let lista=document.getElementById("listaTratamientos");
lista.innerHTML="";
tratamientosDB[doctor].forEach(t=>{
lista.innerHTML+=`<option value="${t.precio}">${t.nombre}</option>`;
});
}

function agregarTratamiento(){

if(!consultaActiva){
alert("Primero cree una consulta");
return;
}

let lista=document.getElementById("listaTratamientos");

let nombre=lista.options[lista.selectedIndex].text;
let precio=parseFloat(lista.value);

tratamientos.push({nombre,precio,cantidad:1});

renderTabla();
calcularTotal();

}

function renderTabla(){

let tabla=document.getElementById("tabla");
tabla.innerHTML="";

tratamientos.forEach((t,i)=>{

let subtotal=t.precio*t.cantidad;

tabla.innerHTML+=`
<tr>
<td>${t.nombre}</td>
<td>$${t.precio.toFixed(2)}</td>
<td><input type="number" value="${t.cantidad}" min="1"
onchange="cambiarCantidad(${i},this.value)"></td>
<td>$${subtotal.toFixed(2)}</td>
<td><button onclick="eliminar(${i})">X</button></td>
</tr>
`;

});

calcularTotal();

}

function cambiarCantidad(i,val){
let cantidad=parseInt(val);
if(isNaN(cantidad)||cantidad<1){cantidad=1;}
tratamientos[i].cantidad=cantidad;
renderTabla();
}

function eliminar(i){
tratamientos.splice(i,1);
renderTabla();
}

function calcularTotal(){

let subtotalCalc=0;

tratamientos.forEach(t=>{
subtotalCalc+=t.precio*t.cantidad;
});

let descuentoPorc=Math.min(Math.max(parseFloat(document.getElementById("descuento").value)||0,0),100);
let impuestoPorc=Math.min(Math.max(parseFloat(document.getElementById("impuesto").value)||0,0),100);

let descuento=subtotalCalc*(descuentoPorc/100);
let base=subtotalCalc-descuento;
let impuesto=base*(impuestoPorc/100);

totalFinal=base+impuesto;

document.getElementById("subtotal").innerText="$"+subtotalCalc.toFixed(2);
document.getElementById("total").innerText=totalFinal.toFixed(2);

}

function emitirFactura() {
    if (!consultaActiva) {
        alert("Primero cree una consulta");
        return;
    }

    if (tratamientos.length == 0) {
        alert("No hay tratamientos");
        return;
    }

    let tablaTratamientos = "";
    tratamientos.forEach(t => {
        let sub = t.precio * t.cantidad;
        tablaTratamientos += `
        <tr>
            <td>${t.nombre}</td>
            <td>${t.cantidad}</td>
            <td>$${t.precio.toFixed(2)}</td>
            <td>$${sub.toFixed(2)}</td>
        </tr>`;
    });

    let doctorSeleccionado = document.getElementById("doctor").value;

    // Solo este bloque se guardará en el historial (sin botones)
    let cuerpoFactura = `
        <div class="factura-header">
            <h2>CLINIDENT</h2>
            <p>Factura #${numeroFactura}</p>
        </div>
        <p><strong>Paciente:</strong> ${nombre.value}</p>
        <p><strong>Documento:</strong> ${documento.value}</p>
        <p><strong>Odontólogo:</strong> ${doctorSeleccionado}</p>
        <hr>
        <table class="table">
            <tr>
                <th>Tratamiento</th>
                <th>Cant</th>
                <th>Precio</th>
                <th>Subtotal</th>
            </tr>
            ${tablaTratamientos}
        </table>
        <h2>Total: $${totalFinal.toFixed(2)}</h2>
    `;

    // Inyectamos cuerpo + botones de acción
    contenidoFactura.innerHTML = cuerpoFactura + `
        <div class="no-print" style="margin-top:20px;">
            <button onclick="registrarPago()" class="btn-success">Confirmar y Pagar</button>
            <button onclick="cerrarFactura()" class="btn-primary">Cerrar</button>
        </div>
    `;

    modalFactura.style.display = "flex";
    facturaGenerada = true;
}
function eliminarFactura(index){

let motivo = prompt("Ingrese el motivo de eliminación de la factura:");

if(!motivo || motivo.trim() === ""){
alert("Debe ingresar un motivo");
return;
}

let factura = pagos[index];

// guardar en historial de eliminadas
facturasEliminadas.push({
factura: factura.factura,
paciente: factura.paciente,
total: factura.total,
motivo: motivo,
fecha: new Date().toLocaleString()
});

// guardar historial
localStorage.setItem("facturasEliminadas", JSON.stringify(facturasEliminadas));

// eliminar de pagos
pagos.splice(index,1);

// actualizar almacenamiento
localStorage.setItem("pagos", JSON.stringify(pagos));

alert("Factura eliminada y registrada");

// actualizar tabla
verPagos();

}
function cerrarFactura(){
modalFactura.style.display="none";
}

function registrarPago() {

    if (!facturaGenerada) {
        alert("Primero emita factura");
        return;
    }

    if (pagos.some(p => p.factura == numeroFactura)) {
        alert("Factura ya pagada");
        return;
    }

    // Clonamos el contenido pero removemos los botones antes de guardar
    let tempDiv = document.createElement("div");
    tempDiv.innerHTML = contenidoFactura.innerHTML;

    let botones = tempDiv.querySelector(".no-print");
    if(botones) botones.remove();

    pagos.push({
        factura: numeroFactura,
        paciente: nombre.value,
        total: totalFinal,
        detalleHTML: tempDiv.innerHTML
    });

    // Guardamos pagos en el navegador
    localStorage.setItem("pagos", JSON.stringify(pagos));

    alert("Pago registrado con éxito");

    // Incrementamos número de factura
    numeroFactura++;

    // Guardamos número de factura
    localStorage.setItem("numeroFactura", numeroFactura);

    // Limpiar sistema para siguiente paciente
    nuevaConsulta();
    nombre.value = "";
    documento.value = "";
    document.getElementById("selectPaciente").value = "";

    cerrarFactura();
}
function verPagos(){

let contenido = `<h2>Historial de Pagos</h2>

<table class="table">

<tr>
<th>Factura</th>
<th>Paciente</th>
<th>Total</th>
<th>Acciones</th>
</tr>`;

pagos.forEach((p, index)=>{

contenido += `
<tr>
<td>${p.factura}</td>
<td>${p.paciente}</td>
<td>$${p.total.toFixed(2)}</td>
<td>
<button onclick="verDetalleFactura(${index})" class="btn-primary" style="margin:0;padding:5px 10px;">Ver</button>

<button onclick="eliminarFactura(${index})" class="btn-danger" style="margin:0;padding:5px 10px;">Eliminar</button>
</td>
</tr>
`;

});

contenido += `</table>

<br>

<button onclick="cerrarPagos()" class="btn-primary">Cerrar</button>`;

contenidoPagos.innerHTML = contenido;
modalPagos.style.display = "flex";

}

function verDetalleFactura(index) {
    let pago = pagos[index];
    
    if (pago && pago.detalleHTML) {
        // Inyectamos el HTML limpio y agregamos UN solo botón de cerrar
        contenidoFactura.innerHTML = pago.detalleHTML + `
            <div style="margin-top:20px;">
                <button onclick="window.print()" class="btn-success">Imprimir PDF</button>
                <button onclick="cerrarFactura()" class="btn-primary">Regresar</button>
            </div>
        `;
        
        modalPagos.style.display = "none";
        modalFactura.style.display = "flex";
    }
}
function cerrarPagos(){
modalPagos.style.display="none";
}

actualizarTratamientos();
cargarPacientes();

</script>

</body>
</html>
