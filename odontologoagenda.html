<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLINIDENT | Panel Médico</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
    --azul-oscuro:#0f172a;
    --azul-principal:#2563eb;
    --azul-claro:#60a5fa;
    --azul-suave:#dbeafe;
    --blanco:#ffffff;
    --verde:#10b981;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    color:#0f172a;
}

/* NAVBAR */
.navbar{
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding:15px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:white;
    border-bottom:1px solid rgba(255,255,255,0.2);
}

/* CONTENEDOR */
.container{
    max-width:1200px;
    margin:40px auto;
    padding:20px;
}

/* HEADER */
.header-panel{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
    color:white;
}

/* BOTÓN */
.refresh-btn{
    background: linear-gradient(135deg,var(--azul-principal),var(--azul-claro));
    border:none;
    padding:12px 22px;
    border-radius:10px;
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.refresh-btn:hover{
    transform:translateY(-2px) scale(1.05);
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* TABLA */
.agenda-table{
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,0.95);
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.agenda-table th{
    background:var(--azul-suave);
    padding:18px;
    text-transform:uppercase;
    font-size:0.8rem;
    color:#1e3a8a;
}

.agenda-table td{
    padding:18px;
    border-bottom:1px solid #e2e8f0;
}

.agenda-table tr:hover{
    background:#f1f5f9;
    transition:0.2s;
}

/* BOTÓN ATENDER */
.btn-atender{
    background:linear-gradient(135deg,#10b981,#059669);
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

.btn-atender:hover{
    transform:scale(1.1);
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    z-index:1000;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(5px);
}

.modal-content{
    background:white;
    margin:8% auto;
    padding:30px;
    border-radius:20px;
    width:450px;
    box-shadow:0 25px 60px rgba(0,0,0,0.4);
    animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
    from{transform:translateY(-20px);opacity:0;}
    to{transform:translateY(0);opacity:1;}
}

/* INPUTS */
textarea{
    width:100%;
    height:100px;
    padding:12px;
    border-radius:10px;
    border:1px solid #cbd5e1;
    margin-top:10px;
    resize:none;
}

/* BOTÓN GUARDAR */
.btn-guardar-ficha{
    background:linear-gradient(135deg,var(--azul-principal),var(--azul-claro));
    color:white;
    border:none;
    padding:12px;
    width:100%;
    border-radius:10px;
    margin-top:20px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

.btn-guardar-ficha:hover{
    transform:scale(1.05);
}

/* RELOJ */
#reloj{
    font-weight:600;
    opacity:0.9;
}
</style>
</head>

<body>

<nav class="navbar">
    <div style="font-weight:800;font-size:22px;">
        CLINIDENT <span style="opacity:0.7;">| Portal Médico</span>
    </div>
    <div id="reloj"></div>
</nav>

<div class="container">
    <div class="header-panel">
        <h1>Agenda de Consultas</h1>
        <button class="refresh-btn" onclick="cargarAgenda()">🔄 Actualizar</button>
    </div>

    <table class="agenda-table">
        <thead>
            <tr>
                <th>Hora</th>
                <th>Paciente</th>
                <th>Especialista</th>
                <th>Fecha</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
    </table>
</div>

<!-- MODAL -->
<div id="modalDiagnostico" class="modal">
    <div class="modal-content">
        <h2>Ficha de Atención</h2>
        <p id="paciente-nombre" style="font-weight:800;color:#2563eb;"></p>

        <label><b>Diagnóstico:</b></label>
        <textarea id="diag"></textarea>

        <label style="margin-top:10px;display:block;"><b>Tratamiento:</b></label>
        <textarea id="trata"></textarea>

        <button class="btn-guardar-ficha" onclick="guardarAtencion()">Guardar</button>
        <button onclick="cerrarModal()" style="background:none;border:none;color:gray;width:100%;margin-top:10px;cursor:pointer;">Cancelar</button>
    </div>
</div>

<script>
function cargarAgenda(){
    const tbody=document.getElementById('tabla-body');
    tbody.innerHTML="<tr><td colspan='5'>Cargando...</td></tr>";

    fetch('http://localhost/clinident/obtener_citas.php')
    .then(res=>res.json())
    .then(lista=>{
        tbody.innerHTML="";
        lista.forEach(c=>{
            const fila=document.createElement('tr');
            fila.innerHTML=`
                <td style="font-weight:800;color:#2563eb;">${c.hora}</td>
                <td><b>${c.paciente}</b></td>
                <td>${c.doctor}</td>
                <td>${c.fecha}</td>
                <td><button class="btn-atender" onclick="abrirAtencion('${c.paciente}')">Atender</button></td>
            `;
            tbody.appendChild(fila);
        });
    });
}

function abrirAtencion(nombre){
    document.getElementById('paciente-nombre').innerText="Paciente: "+nombre;
    document.getElementById('modalDiagnostico').style.display="block";
}

function cerrarModal(){
    document.getElementById('modalDiagnostico').style.display="none";
}

function guardarAtencion(){
    const d=document.getElementById('diag').value;
    const t=document.getElementById('trata').value;

    if(d===""||t===""){
        alert("Completa todo bro");
        return;
    }

    alert("✅ Guardado correctamente");
    cerrarModal();
}

setInterval(()=>{
    document.getElementById('reloj').innerText=new Date().toLocaleString();
},1000);

window.onload=cargarAgenda;
</script>

</body>
</html>
