<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLINIDENT | Verificación</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --azul-oscuro: #0f172a;
    --azul: #2563eb;
    --azul-claro: #60a5fa;
    --glass: rgba(255,255,255,0.1);
    --blanco: #ffffff;
    --error: #ef4444;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans',sans-serif; }

body {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#1e3a8a,#2563eb,#3b82f6);
}

.card {
    background: var(--glass);
    backdrop-filter: blur(20px);
    padding: 40px 30px;
    border-radius: 20px;
    width: 350px;
    text-align: center;
    color: var(--blanco);
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

h2 {
    margin-bottom: 10px;
    font-weight: 800;
    font-size: 1.8rem;
}

p { opacity: 0.85; margin-bottom: 20px; }

input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
    outline: none;
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 1rem;
    transition: 0.3s;
}

input::placeholder { color: #ddd; }

input:focus {
    box-shadow: 0 0 0 3px rgba(37,99,235,0.3);
    background: rgba(255,255,255,0.25);
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg,var(--azul),var(--azul-claro));
    color: white;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
}

button:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.error {
    color: var(--error);
    margin-top: 12px;
    display: none;
    font-weight: 600;
    font-size: 0.9rem;
}
</style>
</head>

<body>

<div class="card">
    <h2>Código de verificación</h2>
    <p>Ingresa el código enviado a tu correo</p>

    <input type="text" id="codigo" placeholder="Código de 6 dígitos">

    <button onclick="verificarCodigo()">Verificar</button>

    <p id="error" class="error">Código incorrecto</p>
</div>

<script>
function verificarCodigo(){
    const codigoIngresado = document.getElementById("codigo").value;
    const codigoCorrecto = "123456";

    if(codigoIngresado === codigoCorrecto){
        window.location.href = "nueva_contraseña.html";
    } else {
        const error = document.getElementById("error");
        error.style.display = "block";
        setTimeout(() => { error.style.display = "none"; }, 3000);
    }
}
</script>

</body>
</html>
