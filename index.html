<!DOCTYPE html>
<html lang="es">
<head>
 
<head>
  <meta charset="UTF-8">
  <title>CLINIDENT</title>

  <!-- 🔥 AQUÍ VA -->
  <link rel="manifest" href="manifest.json?v=10">

  <!-- Opcional pero recomendado -->
  <link rel="icon" href="icon-192.png">

  <meta name="theme-color" content="#4a8dc7">
</head>
    <meta charset="UTF-8">
    <title>CLINIDENT | Iniciar Sesión</title>
    <style>

        /* 🔵 NUEVO FONDO ANIMADO */
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(
                270deg,
                #0f172a,
                #1e3a8a,
                #2563eb,
                #38bdf8,
                #1e3a8a
            );
            background-size: 400% 400%;
            animation: fondoAnimado 10s ease infinite;

            padding: 30px;
            color: #1e293b;
        }

        /* ⚡ ANIMACIÓN */
        @keyframes fondoAnimado {
            0% { background-position: 0% 50%; }
            25% { background-position: 50% 100%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 0%; }
            100% { background-position: 0% 50%; }
        }

        /* CARD */
        .card {
            background: white;
            padding: 40px;
            border-radius: 18px;
            width: 350px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            font-size: 12px;
            color: #666;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 11px;
            border-radius: 6px;
            border: 1px solid #ddd;
            margin-top: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

    </style>
</head>

<body>
    
    <div class="card">
        <img src="clinident_logo.png" width="80" alt="Logo">
        <h2>Iniciar Sesión</h2>

        <div class="input-group">
            <label>Usuario</label>
            <input type="text" id="user-name" placeholder="Tu nombre">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="user-pass" placeholder="********">
        </div>

        <div class="input-group">
            <label>Acceder como:</label>
            <select id="user-role">
                <option value="paciente">Paciente</option>
                <option value="odontologo">Odontólogo</option>
                <option value="recepcionista">Recepcionista</option>
                <option value="Admin">Admin</option>
            </select>
        </div>

        <button onclick="gestionarAcceso()">Entrar</button>
    </div>

    <script>
        function gestionarAcceso() {
            const user = document.getElementById('user-name').value;
            const rol = document.getElementById('user-role').value;

            if (user === "") {
                alert("Escribe tu usuario");
                return;
            }

            if (rol === "paciente") {
                window.location.href = "agenda.html"; 
            } else {
                window.location.href = "odontologo.html";
            }
        }
    </script>

</body>
</html>
