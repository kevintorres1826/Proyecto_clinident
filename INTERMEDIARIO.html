<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Gestión Mixto</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }

        .container {
            text-align: center;
            background: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            width: 320px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 2rem;
            font-size: 22px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-direction: column;
        }

        .btn {
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
        }

        /* Colores */
        .btn-agenda { background-color: #8e44ad; }
        .btn-registro { background-color: #2980b9; } 
        .btn-historial { background-color: #27ae60; }
        .btn-facturacion { background-color: #e67e22; }

    </style>
</head>
<body>

    <div class="container">
        <h1>Panel de Gestión</h1>
        <div class="button-group">
            
            <button class="btn btn-agenda" onclick="window.location.href='file:///C:/xampp/htdocs/EjercicioUno/Vista/Html/Agenda.html'">
                📅 Agenda
            </button>

            <button class="btn btn-registro" onclick="window.location.href='http://localhost/EjercicioUno/Vista/Html/Registro_ANGELA.html'">
                📝 Registro
            </button>

            <button class="btn btn-historial" onclick="window.location.href='file:///C:/xampp/htdocs/EjercicioUno/Vista/Html/Historial_ANGELA.html'">
                📜 Historial
            </button>

            <button class="btn btn-facturacion" onclick="window.location.href='file:///C:/xampp/htdocs/EjercicioUno/Vista/Html/clinident_js.html'">
                💰 Facturación
            </button>

        </div>
    </div>

</body>
</html>
